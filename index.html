<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>💀 SECRET MAZE</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    text-align:center;
    font-family:monospace;
}

canvas{
    border:2px solid #00ffcc;
    margin-top:10px;
}

button{
    padding:8px;
    margin:5px;
}

#final{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#final img{
    width:80%;
    max-width:500px;
}
</style>
</head>

<body>

<h2>💀 MẸ MÀY BÉO 💀</h2>
<button onclick="startGame()">START</button>
<button onclick="openFS()">FULLSCREEN</button>

<canvas id="game" width="450" height="450"></canvas>

<h3 id="status"></h3>

<!-- MOBILE CONTROL -->
<div>
  <button onclick="move('w')">⬆️</button><br>
  <button onclick="move('a')">⬅️</button>
  <button onclick="move('s')">⬇️</button>
  <button onclick="move('d')">➡️</button>
</div>

<!-- WIN SCREEN -->
<div id="final">
    <h1>🗿 ACCESS GRANTED</h1>
    <img src="final.jpeg">
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let level = 1;
let maze;
let player;

// ===== RANDOM MAZE (KHÓ) =====
function generateMaze(size, density){
    let m = Array.from({length:size}, ()=>Array(size).fill(1));

    let x=1, y=1;
    m[y][x]=0;

    let dirs=[[0,-1],[0,1],[-1,0],[1,0]];
    let steps = size*size*density;

    for(let i=0;i<steps;i++){
        let d = dirs[Math.floor(Math.random()*4)];
        let nx = x + d[0]*2;
        let ny = y + d[1]*2;

        if(ny>0 && ny<size-1 && nx>0 && nx<size-1){
            m[ny][nx]=0;
            m[y+d[1]][x+d[0]]=0;
            x=nx; y=ny;
        }
    }

    m[size-2][size-2]=0;
    return m;
}

// ===== START =====
function startGame(){
    level=1;
    document.getElementById("final").style.display="none";
    loadLevel();
}

// ===== FULLSCREEN =====
function openFS(){
    document.documentElement.requestFullscreen?.();
}

// ===== LOAD LEVEL =====
function loadLevel(){
    if(level===1){
        maze = generateMaze(15,1.3); // 🔥 khó
        player={x:1,y:1};
        document.getElementById("status").innerText="LV1: Nightmare";
    }else{
        maze = generateMaze(21,2.6); // 💀 siêu khó
        player={x:1,y:1};
        document.getElementById("status").innerText="LV2: Hell Maze";
    }
    drawMaze();
}

// ===== DRAW (FOG 3 Ô) =====
function drawMaze(){
    ctx.clearRect(0,0,450,450);
    let size = 450/maze.length;

    for(let y=0;y<maze.length;y++){
        for(let x=0;x<maze[y].length;x++){

            let dx=Math.abs(player.x-x);
            let dy=Math.abs(player.y-y);

            if(dx<=3 && dy<=3){

                if(maze[y][x]===1){
                    ctx.fillStyle="#00ffcc";
                    ctx.fillRect(x*size,y*size,size,size);
                }

                if(x===maze[0].length-2 && y===maze.length-2){
                    ctx.fillStyle="yellow";
                    ctx.fillRect(x*size,y*size,size,size);
                }

            }else{
                ctx.fillStyle="black";
                ctx.fillRect(x*size,y*size,size,size);
            }
        }
    }

    ctx.fillStyle="red";
    ctx.fillRect(player.x*size,player.y*size,size,size);
}

// ===== MOVE =====
function move(key){
    let nx=player.x;
    let ny=player.y;

    if(key==="w") ny--;
    if(key==="s") ny++;
    if(key==="a") nx--;
    if(key==="d") nx++;

    if(maze[ny]?.[nx]===0){
        player.x=nx;
        player.y=ny;
    }

    drawMaze();
    checkWin();
}

// PC control
document.addEventListener("keydown",e=>move(e.key));

// ===== WIN =====
function checkWin(){
    let ex=maze[0].length-2;
    let ey=maze.length-2;

    if(player.x===ex && player.y===ey){
        if(level===1){
            level=2;
            loadLevel();
        }else{
            document.getElementById("final").style.display="flex";
            document.getElementById("status").innerText="WIN 🗿";
        }
    }
}
</script>

</body>
</html>
